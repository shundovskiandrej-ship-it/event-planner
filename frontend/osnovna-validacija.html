<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planner Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #333; 
            color: white; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .wrapper { width: 100%; max-width: 400px; padding: 20px; }
        #loginMessage { min-height: 24px; font-size: 0.9rem; }
    </style>
</head>
<body>

<section class="wrapper text-center position-relative">
    <div class="form signup">
        <header class="h3 mb-4">Event Planner Login</header>
        
        <form id="loginForm" action="#" novalidate>
            <input id="email" type="email" class="form-control my-2" placeholder="Email address" required>
            
            <input id="password" type="password" class="form-control my-2" placeholder="Password" required>
            
            <div class="d-flex justify-content-between align-items-center small">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label text-white" for="rememberMe">Remember Me</label>
                </div>
                <a href="forgot-password.html" class="text-white text-decoration-none">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-light w-100 mt-3">Log In</button>
            
            <div id="loginMessage" class="text-danger mt-2"></div>

            <a href="register.html" class="d-block mt-3 text-white text-decoration-none">
                Don't have an account? Register
            </a>
        </form>
    </div>
</section>

<script>
    // Иницијализација на променливите
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginMessage = document.getElementById("loginMessage");

    loginForm.addEventListener("submit", function (event) {
        // Стопирај го освежувањето на страната
        event.preventDefault();

        // Валидација (преземена од втората слика)
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (email === "" || password === "") {
            loginMessage.textContent = "Грешка: пополнете ги сите полиња.";
            return; 
        }

        // Ако е успешно
        loginMessage.classList.replace("text-danger", "text-success");
        loginMessage.textContent = "Успешна најава! Ве пренасочуваме...";
        
        // Опционално: Симулирај пренасочување по 1 секунда
        setTimeout(() => {
            alert("Најавата е успешна!");
        }, 500);
    });
</script>

</body>
</html>
