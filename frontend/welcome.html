<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Event Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Истата длабока темна боја */
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Светлосни ефекти во позадина */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .welcome-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 60px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.07);
            border-color: #6366f1;
        }

        .stat-card h3 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .logout-btn {
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .user-avatar {
            border: 4px solid rgba(99, 102, 241, 0.2);
            padding: 5px;
        }

        .btn-main {
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 14px;
            padding: 15px 40px;
            transition: transform 0.2s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            color: white;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 70%);"></div>

    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="#">Event<span style="color: #a855f7;">Planner</span></a>
            <div class="d-flex">
                <a href="login.html" class="btn btn-outline-danger logout-btn">Одјави се</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
                <div class="welcome-card shadow-2xl">
                    <div class="mb-4">
                        <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff&size=100" 
                             class="rounded-circle user-avatar shadow" alt="User Avatar">
                    </div>
                    
                    <h1 class="display-5 fw-bold mb-3">Добредојде назад!</h1>
                    <p class="lead mb-5 text-secondary">Вашата најава беше успешна. Вашиот панел е подготвен за работа.</p>
                    
                    <div class="row g-4">
                        <div class="col-md-4">
                            <div class="stat-card">
                                <h3>12</h3>
                                <small class="text-uppercase tracking-wider opacity-50">Настани</small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card">
                                <h3>5</h3>
                                <small class="text-uppercase tracking-wider opacity-50">Известувања</small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card">
                                <h3>24</h3>
                                <small class="text-uppercase tracking-wider opacity-50">Покани</small>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5">
                        <a href="Home.html" class="btn btn-main btn-lg shadow">Влези во Home Панел</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
