<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ресетирање на лозинка - Event Planner">
    <title>Нова лозинка | Event Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-5 col-xl-4">
                
                <div class="welcome-card text-center shadow-2xl">
                    <header class="h2 fw-bold mb-4">Нова <span style="color: #a855f7;">лозинка</span></header>
                    <p class="text-secondary mb-4 small">Внесете ја вашата нова лозинка подолу.</p>

                    <form onsubmit="event.preventDefault(); alert('Лозинката е успешно променета!'); window.location.href='login.html';">
                        <div class="mb-3">
                            <input type="password" class="form-control custom-input" placeholder="Нова лозинка" required>
                        </div>
                        
                        <div class="mb-4">
                            <input type="password" class="form-control custom-input" placeholder="Потврди ја лозинката" required>
                        </div>
                        
                        <button type="submit" class="btn btn-main w-100 mb-2 shadow">Зачувај промени</button>
                    </form>

                    <div class="mt-4 pt-3 border-top border-secondary opacity-50">
                        <a href="login.html" class="text-decoration-none small" style="color: #a855f7; font-weight: 600;">
                            Откажи
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
