<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Planner login form using Bootstrap">
    <title>Event Planner Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #f8f9fa;">
    <section class="wrapper text-center position-relative">
        <div class="form signup">
            <header>Event Planner Login</header>
            <form action="#">
                <input type="email" class="form-control my-2" placeholder="Email address" required>
                <input type="password" class="form-control my-2" placeholder="Password" required>
                <div class="d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-white" for="rememberMe">Remember Me</label>
                    </div>
                    <a href="forgot-password.html" class="text-white text-decoration-none">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-light w-100 mt-3">Log In</button>
            </form>
            <div class="mt-3">
                <a href="register.html" class="d-block mt-3 text-white text-decoration-none">Don't have an account? Register</a>
            </div>
        </div>
        <div class="form login">
            <header class="mb-auto">Event Planner Login</header>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
