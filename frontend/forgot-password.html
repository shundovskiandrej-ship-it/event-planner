<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Planner Forgot Password form using Bootstrap">
    <title>Event Planner Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        function resetPassword() {
            window.location.href = 'reset-password.html';
        }
    </script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #f8f9fa;">
    <section class="wrapper text-center position-relative">
        <div class="form signup">
            <header>Event Planner Forgot Password</header>
            <form action="#">
                <input type="email" class="form-control my-2" placeholder="Email address" required>
                <input type="button" class="btn btn-light w-100 mt-3" onclick="resetPassword()" value="Reset Password">
            </form>
        </div>
        <div class="form login">
            <header></header>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
