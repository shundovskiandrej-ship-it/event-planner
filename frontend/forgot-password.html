<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Заборавена лозинка - Event Planner">
    <title>Заборавена лозинка | Event Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        function goToReset() {
            // Оваа функција ја имитира логиката за праќање меил и те носи на страната за нова лозинка
            window.location.href = 'reset-password.html';
        }
    </script>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-5 col-xl-4">
                
                <div class="welcome-card text-center shadow-2xl">
                    <header class="h2 fw-bold mb-4">Заборавена <span style="color: #a855f7;">лозинка?</span></header>
                    <p class="text-secondary mb-4 small">Не грижете се. Внесете го вашиот емаил и ќе ви испратиме инструкции за ресетирање.</p>

                    <form onsubmit="event.preventDefault(); goToReset();">
                        <div class="mb-4 text-start">
                            <label class="form-label small text-secondary ms-2">Емаил адреса</label>
                            <input type="email" class="form-control custom-input" placeholder="example@mail.com" required>
                        </div>
                        
                        <button type="submit" class="btn btn-main w-100 mb-3 shadow">Испрати инструкции</button>
                    </form>

                    <div class="mt-4 pt-3 border-top border-secondary opacity-50">
                        <a href="login.html" class="text-decoration-none small" style="color: #a855f7; font-weight: 600;">
                            ← Назад кон најава
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
