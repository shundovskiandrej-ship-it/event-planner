<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Planner registration form">
    <title>Регистрација | Event Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 70%);"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 20px 0;">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-6 col-xl-5">
                
                <div class="welcome-card text-center shadow-2xl">
                    <header class="h2 fw-bold mb-4">Event<span style="color: #a855f7;">Planner</span></header>
                    <p class="text-secondary mb-4 small">Креирајте нов профил за да започнете</p>

                    <form id="registerForm" novalidate>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <input type="text" id="firstName" class="form-control custom-input" placeholder="Име" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" id="lastName" class="form-control custom-input" placeholder="Презиме" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <input id="email" type="email" class="form-control custom-input" placeholder="Емаил адреса" required>
                        </div>
                        
                        <div class="mb-3">
                            <input id="password" type="password" class="form-control custom-input" placeholder="Лозинка" required>
                        </div>

                        <div class="mb-4">
                            <input id="confirmPassword" type="password" class="form-control custom-input" placeholder="Потврди лозинка" required>
                        </div>

                        <button type="submit" class="btn btn-main w-100 mb-2 shadow">Регистрирај се</button>
                    </form>

                    <div class="mt-4 pt-3 border-top border-secondary opacity-50">
                        <p class="small text-white mb-0">Веќе имате профил? 
                            <a href="login.html" class="text-decoration-none" style="color: #a855f7; font-weight: 600;">Најавете се</a>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="functions.js"></script>
    <script>
        const registerForm = document.getElementById("registerForm");
        
        if (registerForm) {
            registerForm.addEventListener("submit", function (event) {
                event.preventDefault();

                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value.trim();
                const confirmPassword = document.getElementById("confirmPassword").value.trim();

                // 1. Проверка за празни полиња
                if (!email || !password || !confirmPassword) {
                    alert("Грешка: Сите полиња мора да бидат пополнети.");
                    return;
                }

                // 2. Проверка дали лозинките се совпаѓаат
                if (password !== confirmPassword) {
                    alert("Грешка: Лозинките не се совпаѓаат!");
                    return;
                }

                // 3. Користење на функциите од functions.js
                const emailIsValid = validateEmail(email);
                const passwordIsValid = validatePassword(password);

                if (emailIsValid && passwordIsValid) {
                    alert("Успешна регистрација! Сега можете да се најавите.");
                    window.location.href = "login.html";
                } else if (!emailIsValid) {
                    alert("Грешка: Невалиден формат на емаил.");
                } else {
                    alert("Грешка: Лозинката мора да има мин. 8 карактери, голема буква, бројка и специјален знак.");
                }
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
