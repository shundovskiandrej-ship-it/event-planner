<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Planner registration form using Bootstrap">
    <title>Event Planner Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #f8f9fa;">
    <section class="wrapper text-center position-relative">
        <div class="form signup">
            <header>Event Planner Registration</header>
            <form action="#">
                <div class="row">
                    <div class="col-md-6">
                        <input type="text" class="form-control my-2" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control my-2" placeholder="Last Name" required>
                    </div>
                </div>
                <input type="email" class="form-control my-2" placeholder="Email" required>
                <input type="password" class="form-control my-2" placeholder="Password" required>
                <input type="password" class="form-control my-2" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-light w-100 mt-3">Register</button>
            </form>
        </div>
        <div class="form login">
            <header class="mb-auto">Event Planner Registration</header>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
