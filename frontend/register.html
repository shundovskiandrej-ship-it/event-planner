<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Planner registration form using Bootstrap">
    <title>Event Planner Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #333;">
    <section class="wrapper text-center position-relative" style="max-width: 500px; width: 100%;">
        <div class="form signup">
            <header class="h3 mb-4 text-white">Event Planner Registration</header>
            
            <form id="registerForm" action="#" novalidate>
                <div class="row">
                    <div class="col-md-6">
                        <input type="text" id="firstName" class="form-control my-2" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" id="lastName" class="form-control my-2" placeholder="Last Name" required>
                    </div>
                </div>
                
                <input id="email" type="email" class="form-control my-2" placeholder="Email" required>
                <input id="password" type="password" class="form-control my-2" placeholder="Password" required>
                <input id="confirmPassword" type="password" class="form-control my-2" placeholder="Confirm Password" required>
                
                <button type="submit" class="btn btn-light w-100 mt-3">Register</button>
            </form>
            
            <div class="mt-3">
                <a href="login.html" class="text-white text-decoration-none small">Already have an account? Login</a>
            </div>
        </div>
    </section>

    <script src="functions.js"></script>
    <script>
        const registerForm = document.getElementById("registerForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("confirmPassword");

        registerForm.addEventListener("submit", function (event) {
            event.preventDefault(); // КЛУЧНО: Спречува заглавување/освежување

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            // 1. Проверка за празни полиња
            if (email === "" || password === "" || confirmPassword === "") {
                alert("Грешка: Сите полиња мора да бидат пополнети.");
                return;
            }

            // 2. Проверка дали лозинките се совпаѓаат
            if (password !== confirmPassword) {
                alert("Грешка: Лозинките не се совпаѓаат!");
                return;
            }

            // 3. Напредна валидација преку functions.js
            const emailIsValid = validateEmail(email);
            const passwordIsValid = validatePassword(password);

            if (emailIsValid && passwordIsValid) {
                alert("Успешна регистрација! Сега можете да се најавите.");
                window.location.href = "login.html"; // Те враќа на Login
            } else if (!emailIsValid) {
                alert("Грешка: Внесете валиден email формат.");
            } else {
                alert("Грешка: Лозинката мора да има мин. 8 карактери, голема буква, бројка и специјален знак.");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
